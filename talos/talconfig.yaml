# talconfig.yaml - Talos cluster configuration
#
# This file is used with 'talosctl gen config' to produce machine configs.
# You can also use talhelper (https://github.com/budimanjojo/talhelper) for
# a more declarative approach.
#
# Quick start (manual):
#   talosctl gen config talos-proxmox https://<VIP>:6443 \
#     --config-patch @patches/controlplane.yaml \
#     --config-patch-worker @patches/worker.yaml \
#     --output-dir _out
#
# Quick start (talhelper):
#   talhelper genconfig
#
# This file documents the intended cluster topology. Actual config generation
# is handled by the Makefile targets.

clusterName: talos-proxmox
talosVersion: v1.12.5
kubernetesVersion: v1.35.2
endpoint: https://192.168.86.100:6443  # Update with your VIP

# Control plane nodes
nodes:
  - hostname: talos-proxmox-cp-0
    ipAddress: 192.168.86.101
    controlPlane: true
    installDiskSelector:
      size: ">= 40GB"
    networkInterfaces:
      - deviceSelector:
          driver: virtio_net
        dhcp: false
        addresses:
          - 192.168.86.101/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.86.1
        vip:
          ip: 192.168.86.100

  # Worker nodes
  - hostname: talos-proxmox-worker-0
    ipAddress: 192.168.86.111
    controlPlane: false
    installDiskSelector:
      size: ">= 40GB"
    networkInterfaces:
      - deviceSelector:
          driver: virtio_net
        dhcp: false
        addresses:
          - 192.168.86.111/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.86.1

  - hostname: talos-proxmox-worker-1
    ipAddress: 192.168.86.112
    controlPlane: false
    installDiskSelector:
      size: ">= 40GB"
    networkInterfaces:
      - deviceSelector:
          driver: virtio_net
        dhcp: false
        addresses:
          - 192.168.86.112/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.86.1

  - hostname: talos-proxmox-worker-2
    ipAddress: 192.168.86.113
    controlPlane: false
    installDiskSelector:
      size: ">= 40GB"
    networkInterfaces:
      - deviceSelector:
          driver: virtio_net
        dhcp: false
        addresses:
          - 192.168.86.113/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.86.1
