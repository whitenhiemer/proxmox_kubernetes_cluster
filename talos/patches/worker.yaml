# worker.yaml - Talos config patches for worker nodes on Proxmox
#
# Applied via: talosctl gen config ... --config-patch-worker @patches/worker.yaml

machine:
  network:
    interfaces:
      - deviceSelector:
          driver: virtio_net
        addresses:
          - ${WORKER_IP}/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.86.1
    nameservers:
      - 192.168.86.1
      - 1.1.1.1

  # Install to the first virtio disk
  install:
    disk: /dev/sda
    image: ghcr.io/siderolabs/installer:${TALOS_VERSION}
    wipe: false

  # Kubelet configuration
  kubelet:
    extraArgs:
      rotate-server-certificates: "true"

  # Time sync
  time:
    disabled: false
    servers:
      - time.cloudflare.com

  sysctls:
    net.core.somaxconn: "65535"
