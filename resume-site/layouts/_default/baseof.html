<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #ffffff;
            --surface: #f5f5f5;
            --border: rgba(0,0,0,0.08);
            --text: #0a0a0a;
            --dim: #404040;
            --muted: #737373;
            --accent: #e8580c;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            max-width: 860px;
            margin: 0 auto;
            padding: 3rem 2rem 5rem;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── Header ── */
        header {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.3rem;
        }

        .title {
            font-size: 1rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 0.75rem;
        }

        .contact {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 0;
            font-size: 0.82rem;
            color: var(--muted);
            align-items: center;
        }

        .contact a { color: var(--muted); }
        .contact a:hover { color: var(--accent); text-decoration: none; }
        .sep { margin: 0 0.5rem; color: var(--border); }

        /* ── Sections ── */
        section { margin-bottom: 2.5rem; }

        section h2 {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        section > p {
            font-size: 0.9rem;
            color: var(--dim);
            line-height: 1.75;
            max-width: 720px;
        }

        /* ── Entries ── */
        .entry { margin-bottom: 1.5rem; }

        .entry h3 {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 0.15rem;
        }

        .company-role {
            font-weight: 400;
            color: var(--muted);
        }

        .meta {
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            font-family: 'IBM Plex Mono', monospace;
        }

        .entry p {
            font-size: 0.875rem;
            color: var(--dim);
            line-height: 1.7;
            margin-bottom: 0.5rem;
            max-width: 700px;
        }

        .entry ul {
            padding-left: 1.1rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .entry ul li {
            font-size: 0.875rem;
            color: var(--dim);
            line-height: 1.6;
        }

        /* ── Skills ── */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .skill-tag {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 0.2rem 0.6rem;
            font-size: 0.78rem;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--dim);
        }

        /* ── Projects ── */
        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.75rem;
        }

        .project-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
        }

        .project-card h4 {
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
            letter-spacing: -0.01em;
        }

        .project-card h4 a { color: var(--text); }
        .project-card h4 a:hover { color: var(--accent); text-decoration: none; }

        .project-card p {
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.55;
        }

        /* ── Print ── */
        @media print {
            body { padding: 1rem; }
            a { color: var(--accent); }
        }

        @media (max-width: 600px) {
            body { padding: 1.5rem 1rem 3rem; }
            header h1 { font-size: 1.5rem; }
            .projects { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    {{ block "main" . }}{{ end }}
</body>
</html>
