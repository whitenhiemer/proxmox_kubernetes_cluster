# docker-compose.yml - OpenClaw AI agent framework
#
# Two services:
#   - openclaw-gateway: API server (18789), bridge for channel integrations (18790)
#   - openclaw-cli: Interactive terminal sharing gateway's network
#
# The Docker image is built from source on the LXC (no published image).
# LLM API keys are loaded from openclaw.env (injected by Ansible, not in git).
#
# Health check: GET http://127.0.0.1:18789/healthz

services:
  openclaw-gateway:
    image: openclaw:local
    container_name: openclaw-gateway
    ports:
      - "18789:18789"    # Gateway API
      - "18790:18790"    # Bridge (Discord, Slack, Telegram integrations)
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
    env_file:
      - ./openclaw.env
    environment:
      - NODE_ENV=production
      - TZ=America/Chicago
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  openclaw-cli:
    image: openclaw:local
    container_name: openclaw-cli
    network_mode: "service:openclaw-gateway"
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    stdin_open: true
    tty: true
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
