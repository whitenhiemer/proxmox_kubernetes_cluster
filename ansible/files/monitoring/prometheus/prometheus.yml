# prometheus.yml - Prometheus scrape configuration
#
# Scrapes all homelab infrastructure: Proxmox hosts, LXC containers, VMs,
# K8s cluster, Docker containers, and service health probes.
#
# Most targets are scraped remotely (no agent install required on target hosts).
# PVE Exporter handles Proxmox metrics via API. Blackbox Exporter handles
# HTTP/ICMP probes. K8s targets require kube-state-metrics + node-exporter
# DaemonSet deployed to the cluster (see k8s/base/monitoring/).
#
# Uncomment targets as services are deployed.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# --- Alert Rules ---
rule_files:
  - /etc/prometheus/rules/*.yml

# --- Alertmanager ---
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# --- Scrape Targets ---
scrape_configs:

  # ===== Local (inside monitoring LXC) =====

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter: monitoring LXC host metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "monitoring"

  # cAdvisor: Docker container metrics (local)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # ===== Proxmox Hosts =====

  # PVE Exporter: queries Proxmox API for host, VM, and LXC metrics.
  # No agent needed on Proxmox nodes -- exporter runs locally.
  - job_name: "proxmox-pve"
    metrics_path: /pve
    params:
      module: [default]
    static_configs:
      - targets:
          - 192.168.86.29    # pve1 (thinkcentre1)
          - 192.168.86.30    # pve2 (thinkcentre2)
          - 192.168.86.31    # pve3 (thinkcentre3)
          - 192.168.86.130   # tower1
          - 192.168.86.147   # zotac
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: pve-exporter:9221

  # ===== Ceph =====

  # Ceph MGR Prometheus module: cluster health, OSD, pool, and RBD metrics.
  # Active MGR runs on thinkcentre1 (pve1). Standby MGRs don't export metrics.
  - job_name: "ceph"
    static_configs:
      - targets: ["192.168.86.29:9283"]
        labels:
          instance: "ceph"

  # ===== Traefik =====

  # Built-in Prometheus metrics endpoint (requires metrics entrypoint in traefik.yml)
  - job_name: "traefik"
    static_configs:
      - targets: ["192.168.86.20:8082"]
        labels:
          instance: "traefik"

  # ===== Kubernetes Cluster =====
  # Uncomment after deploying kube-state-metrics and node-exporter DaemonSet
  # (see k8s/base/monitoring/)

  # kube-state-metrics: pod status, deployment health, resource usage
  # - job_name: "kube-state-metrics"
  #   static_configs:
  #     - targets: ["192.168.86.100:30080"]
  #       labels:
  #         cluster: "talos-proxmox"

  # K8s node exporters (DaemonSet, hostNetwork mode)
  # - job_name: "k8s-nodes"
  #   static_configs:
  #     - targets:
  #         - 192.168.86.101:9100    # control plane
  #         - 192.168.86.111:9100    # worker 0
  #         - 192.168.86.112:9100    # worker 1
  #       labels:
  #         cluster: "talos-proxmox"

  # ===== UPS Monitoring =====

  # NUT Exporter: queries NUT server for UPS battery, load, runtime metrics.
  # Exporters use network_mode: host so Prometheus reaches them via the LXC IP.
  - job_name: "nut"
    metrics_path: /ups_metrics
    static_configs:
      - targets: ["192.168.86.25:9199"]
        labels:
          instance: "ups-thinkcentre3"
      - targets: ["192.168.86.25:9198"]
        labels:
          instance: "ups-tower1"
      - targets: ["192.168.86.25:9197"]
        labels:
          instance: "ups-zotac"

  # ===== Dexcom Glucose Monitoring =====

  # Dexcom exporter: polls Dexcom Share API every 5 minutes
  - job_name: "dexcom"
    scrape_interval: 60s
    static_configs:
      - targets: ["dexcom-exporter:9666"]
        labels:
          instance: "dexcom"

  # ===== Service Health Probes =====

  # HTTP probes: checks that internal services respond with 2xx
  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://192.168.86.21:80       # Recipe site
          - http://192.168.86.22:5055     # Seerr
          - http://192.168.86.22:8989     # Sonarr
          - http://192.168.86.22:7878     # Radarr
          - http://192.168.86.22:9696     # Prowlarr
          - http://192.168.86.22:6767     # Bazarr
          - http://192.168.86.22:8080     # SABnzbd (via gluetun)
          - http://192.168.86.23:32400/web/index.html    # Plex (root returns 401, use /web/index.html)
          - http://192.168.86.24:8096     # Jellyfin
          - http://192.168.86.25:3000     # Grafana
          - http://192.168.86.26:18789    # OpenClaw gateway
          - http://192.168.86.27:8080/health  # Libby Alert (use /health to avoid triggering alerts)
          - http://192.168.86.28:9000     # Authentik
          - http://192.168.86.32:3000     # rdio-scanner (SDR)
          - http://192.168.86.41:8123     # Home Assistant
          - http://192.168.86.131:8080    # Piboard
          - http://192.168.86.136:80      # Klipper Ender 5 Pro (Mainsail)
          - http://192.168.86.138:80      # Klipper Ender 3 (Mainsail)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # HTTPS probes: external domain checks (end-to-end Traefik + TLS)
  - job_name: "blackbox-https"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://woodhead.tech          # Landing page
          - https://grafana.woodhead.tech  # Grafana (redirects to auth, expect 302->200)
          - https://traefik.woodhead.tech  # Traefik dashboard
          - https://scanner.woodhead.tech  # SDR scanner
          - https://alert.woodhead.tech/health  # Libby Alert (use /health to avoid triggering alerts)
          - https://docs.woodhead.tech     # Docusaurus
          - https://resume.woodhead.tech   # Resume site
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # HTTPS insecure probes: self-signed certs
  - job_name: "blackbox-https-insecure"
    metrics_path: /probe
    params:
      module: [https_insecure]
    static_configs:
      - targets:
          - https://192.168.86.40:443    # TrueNAS web UI
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ICMP probes: ping latency and reachability
  - job_name: "blackbox-icmp"
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 192.168.86.1     # Gateway (Google Nest WiFi Pro)
          - 192.168.86.29    # thinkcentre1 (pve1)
          - 192.168.86.30    # thinkcentre2 (pve2)
          - 192.168.86.31    # thinkcentre3 (pve3)
          - 192.168.86.130   # tower1 (pve4)
          - 192.168.86.147   # zotac (pve5)
          - 192.168.86.40    # TrueNAS
          - 192.168.86.41    # Home Assistant
          - 192.168.86.131   # Piboard
          - 192.168.86.136   # Klipper Ender 5 Pro
          - 192.168.86.138   # Klipper Ender 3
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ===== Klipper 3D Printers =====
  # Moonraker /machine/metrics requires [prometheus] in moonraker.conf -- skipped for now
