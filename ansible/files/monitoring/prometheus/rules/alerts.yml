  #
  #     # Pod stuck in pending for 15+ minutes
  #     - alert: KubePodPending
  #       expr: kube_pod_status_phase{phase="Pending"} > 0
  #       for: 15m
  #       labels:
  #         severity: warning
  #       annotations:
  #         summary: "Pod stuck pending: {{ $labels.namespace }}/{{ $labels.pod }}"

  # --- Prometheus Self-Monitoring ---
  - name: prometheus
    rules:
      # Prometheus scrape target is down
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Scrape target down: {{ $labels.job }} / {{ $labels.instance }}"
          description: "Prometheus cannot reach {{ $labels.instance }} (job: {{ $labels.job }}) for 5 minutes."

      # Alertmanager unreachable
      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager is down"
          description: "Prometheus cannot reach Alertmanager. Alerts will not be delivered."
