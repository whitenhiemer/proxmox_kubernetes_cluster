server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy Prometheus API for dashboard status/metrics
    location /api/prometheus/ {
        proxy_pass http://prometheus:9090/api/v1/;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Proxy Alertmanager API for active alerts
    location /api/alertmanager/ {
        proxy_pass http://alertmanager:9093/api/v2/;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}
