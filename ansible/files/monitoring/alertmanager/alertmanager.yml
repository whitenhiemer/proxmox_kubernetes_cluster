# alertmanager.yml - Alert routing configuration
#
# Routes Prometheus alerts to Discord (or Slack) via webhooks.
# Webhook URLs are injected at deploy time via --extra-vars, not stored in git.
#
# Alert severity routing:
#   critical: immediate notification, 1h repeat
#   warning:  notification, 4h repeat
#   info:     silenced (dashboard only)
#
# To configure Discord:
#   1. Create a Discord server (or use existing)
#   2. Create a #homelab-alerts channel
#   3. Channel Settings > Integrations > Webhooks > New Webhook
#   4. Copy the webhook URL
#   5. Pass to Ansible: --extra-vars "discord_webhook=https://discord.com/api/webhooks/..."

global:
  resolve_timeout: 5m

# --- Routing ---
route:
  # Group alerts by name and instance to avoid notification spam
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  # Default to null receiver; Ansible replaces with "discord" when webhook is set
  receiver: "null"

  routes:
    # alertmind: triage all warning/critical alerts via Claude AI, then continue
    # to other receivers so normal notifications still fire.
    - match_re:
        severity: "warning|critical"
      receiver: "alertmind"
      continue: true

    # Glucose alerts: SMS + Alexa + Discord
    # Ansible replaces receiver with "glucose-alerts" when webhooks are set
    - match:
        channel: glucose
      receiver: "null"
      group_wait: 0s
      repeat_interval: 15m
      routes:
        - match:
            severity: critical
          receiver: "null"
          repeat_interval: 15m
        - match:
            severity: warning
          receiver: "null"
          repeat_interval: 30m

    # Critical alerts: more frequent repeat
    - match:
        severity: critical
      receiver: "null"
      repeat_interval: 1h

    # Info alerts: no notification (visible in Grafana/Alertmanager UI only)
    - match:
        severity: info
      receiver: "null"

# --- Receivers ---
receivers:
  # Null receiver (swallows alerts -- used when no webhooks are configured)
  - name: "null"

  # alertmind: AI-powered triage webhook
  - name: "alertmind"
    webhook_configs:
      - url: "http://alertmind:8080/webhook"
        send_resolved: true

# --- Inhibition Rules ---
# Suppress warning alerts when a critical alert fires for the same instance
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
