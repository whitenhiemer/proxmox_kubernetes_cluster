# alertmanager.yml - Alert routing configuration
#
# Routes Prometheus alerts to Discord (or Slack) via webhooks.
# Webhook URLs are injected at deploy time via --extra-vars, not stored in git.
#
# Alert severity routing:
#   critical: immediate notification, 1h repeat
#   warning:  notification, 4h repeat
#   info:     silenced (dashboard only)
#
# To configure Discord:
#   1. Create a Discord server (or use existing)
#   2. Create a #homelab-alerts channel
#   3. Channel Settings > Integrations > Webhooks > New Webhook
#   4. Copy the webhook URL
#   5. Pass to Ansible: --extra-vars "discord_webhook=https://discord.com/api/webhooks/..."

global:
  resolve_timeout: 5m

# --- Routing ---
route:
  # Group alerts by name and instance to avoid notification spam
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "discord"

  routes:
    # Glucose alerts: SMS + Alexa + Discord
    - match:
        channel: glucose
      receiver: "glucose-alerts"
      group_wait: 0s
      repeat_interval: 15m
      routes:
        # Critical glucose: no delay, 15m repeat
        - match:
            severity: critical
          receiver: "glucose-alerts"
          repeat_interval: 15m
        # Warning glucose: 30m repeat
        - match:
            severity: warning
          receiver: "glucose-alerts"
          repeat_interval: 30m

    # Critical alerts: more frequent repeat
    - match:
        severity: critical
      receiver: "discord"
      repeat_interval: 1h

    # Info alerts: no notification (visible in Grafana/Alertmanager UI only)
    - match:
        severity: info
      receiver: "null"

# --- Receivers ---
receivers:
  # Discord native receiver (Alertmanager v0.25.0+)
  # Webhook URL replaced at deploy time via --extra-vars
  - name: "discord"
    discord_configs:
      - webhook_url: "DISCORD_WEBHOOK_URL"
        send_resolved: true

  # Glucose alerts: SMS via Twilio + Alexa via Home Assistant + Discord
  # Webhook URLs replaced at deploy time via --extra-vars
  - name: "glucose-alerts"
    discord_configs:
      - webhook_url: "DISCORD_WEBHOOK_URL"
        send_resolved: true
    webhook_configs:
      # Twilio SMS -- relay container converts Alertmanager JSON to Twilio SMS
      - url: "http://twilio-relay:9667"
        send_resolved: true
      # Home Assistant -- triggers an automation that announces on Alexa
      # Webhook ID injected at deploy time via --extra-vars
      - url: "HA_GLUCOSE_WEBHOOK_URL"
        send_resolved: true

  # Null receiver (swallows alerts -- used for info severity)
  - name: "null"

# --- Inhibition Rules ---
# Suppress warning alerts when a critical alert fires for the same instance
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
