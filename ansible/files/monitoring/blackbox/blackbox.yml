# blackbox.yml - Blackbox exporter probe modules
#
# Defines HTTP and ICMP probe types used by Prometheus scrape configs.
# Probe targets are configured in prometheus.yml, not here -- this file
# only defines the probe behavior (timeouts, expected status codes, etc.).

modules:
  # HTTP probe: expects 2xx response
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []    # Defaults to 2xx
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4

  # HTTPS probe: accepts self-signed certs (TrueNAS, etc.)
  https_insecure:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      tls_config:
        insecure_skip_verify: true

  # ICMP probe: ping (checks host reachability and latency)
  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: ip4
