# docker-compose.yml - SDR scanner stack
#
# trunk-recorder: decodes SNO911 P25 Phase II trunked radio
# rdio-scanner:   web UI for listening to decoded audio by talkgroup
#
# The RTL-SDR V4 USB dongle must be passed through to this LXC from
# the Proxmox host (configured by setup-sdr.yml via cgroup rules).
# Access: https://scanner.woodhead.tech

services:

  trunk-recorder:
    image: ghcr.io/robotastic/trunk-recorder:latest
    container_name: trunk-recorder
    restart: unless-stopped
    privileged: true
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - /opt/sdr/trunk-recorder/config:/app
      - /opt/sdr/recordings:/recordings
    environment:
      - TZ=America/Chicago

  rdio-scanner:
    image: chuot/rdio-scanner:latest
    container_name: rdio-scanner
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /opt/sdr/rdio-scanner:/home/rdio-scanner/data
    environment:
      - TZ=America/Chicago
    depends_on:
      - trunk-recorder
