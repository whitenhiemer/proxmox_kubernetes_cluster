# docker-compose.yml - ARR media management stack
#
# All services share the same Docker network and communicate via
# container names (e.g., sonarr can reach prowlarr at http://prowlarr:9696).
#
# Media storage is mounted from the host at /media via NFS from TrueNAS
# (bind-mounted into the LXC by the Proxmox host via pct set -mp0).
#
# Data persistence: Each service stores its config in /opt/arr/<service>/config.
# These survive container rebuilds. Back up /opt/arr/ to preserve settings.
#
# After starting, configure each service via its web UI:
#   Prowlarr:  http://<ip>:9696  (set up indexers first)
#   Sonarr:    http://<ip>:8989  (connect to Prowlarr + SABnzbd)
#   Radarr:    http://<ip>:7878  (connect to Prowlarr + SABnzbd)
#   Bazarr:    http://<ip>:6767  (connect to Sonarr + Radarr)
#   Overseerr: http://<ip>:5055  (connect to Sonarr + Radarr)
#   SABnzbd:   http://<ip>:8080  (set up Usenet server)

services:

  # --- Prowlarr: Indexer Manager ---
  # Central indexer management. Sonarr/Radarr pull indexer configs from here.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /opt/arr/prowlarr/config:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  # --- Sonarr: TV Show Management ---
  # Monitors RSS feeds, searches indexers, manages TV library.
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /opt/arr/sonarr/config:/config
      - /media:/media          # NFS mount from TrueNAS
      - /media/downloads:/downloads  # Same path as SABnzbd for hardlink imports
    ports:
      - "8989:8989"
    restart: unless-stopped

  # --- Radarr: Movie Management ---
  # Same as Sonarr but for movies.
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /opt/arr/radarr/config:/config
      - /media:/media
      - /media/downloads:/downloads  # Same path as SABnzbd for hardlink imports
    ports:
      - "7878:7878"
    restart: unless-stopped

  # --- Bazarr: Subtitle Management ---
  # Automatically downloads subtitles for Sonarr/Radarr media.
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /opt/arr/bazarr/config:/config
      - /media:/media
    ports:
      - "6767:6767"
    restart: unless-stopped

  # --- Seerr: Request Management ---
  # Successor to Overseerr/Jellyseerr. Supports Plex, Jellyfin, and Emby.
  # User-facing portal for requesting movies/TV shows.
  # Integrates with Sonarr/Radarr to automatically fulfill requests.
  overseerr:
    image: seerr/seerr:latest
    container_name: overseerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /opt/arr/overseerr/config:/app/config
    ports:
      - "5055:5055"
    restart: unless-stopped

  # --- SABnzbd: Usenet Downloader ---
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /opt/arr/sabnzbd/config:/config
      - /media/downloads:/downloads
    ports:
      - "8080:8080"
    restart: unless-stopped
