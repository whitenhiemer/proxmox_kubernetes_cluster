# users_database.yml - Authelia file-based user database
#
# Passwords are argon2id hashes generated by the setup playbook.
# To add users manually:
#   docker run --rm authelia/authelia:latest crypto hash generate argon2 --password 'your-password'
#
# Groups control access policy (see configuration.yml):
#   admins - full access to all services (two_factor required)
#   users  - limited access to family-friendly services (one_factor)

users:
  brandon:
    displayname: "Brandon Woodward"
    # Password hash is injected by the Ansible playbook at deploy time.
    # This placeholder will be replaced with a real argon2id hash.
    password: "PLACEHOLDER_HASH"
    email: brandon@woodhead.tech
    groups:
      - admins
      - users
