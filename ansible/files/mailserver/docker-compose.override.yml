# docker-compose.override.yml - Mailcow overrides for homelab deployment
#
# Disables ClamAV to save ~1GB RAM. Mailcow's own docker-compose.yml
# is generated by mailcow's generate_config.sh -- this file layers on
# our customizations without modifying upstream files.

services:
  # Disable ClamAV (saves ~1GB RAM, rspamd still provides spam filtering)
  clamd-mailcow:
    image: mailcow/clamd:latest
    entrypoint: ["sleep", "infinity"]
    restart: "no"
