# traefik.yml - Traefik static configuration
#
# This is the main Traefik config. It defines entrypoints (ports),
# the ACME certificate resolver (Let's Encrypt via Cloudflare DNS-01),
# and the file provider for dynamic route configs.
#
# Dynamic routes are loaded from /etc/traefik/dynamic/*.yml and are
# hot-reloaded when files change (no restart needed).

# --- Entrypoints ---
# These define the ports Traefik listens on.
entryPoints:
  # HTTP entrypoint - redirects everything to HTTPS
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  # HTTPS entrypoint - all real traffic comes through here
  websecure:
    address: ":443"

  # Prometheus metrics endpoint (internal only, not port-forwarded)
  # Scraped by Prometheus at http://192.168.86.20:8082/metrics
  metrics:
    address: ":8082"

# --- Prometheus Metrics ---
# Expose request counts, duration histograms, TLS cert expiry, and retry metrics.
metrics:
  prometheus:
    entryPoint: metrics

# --- TLS Certificate Resolver ---
# Uses Let's Encrypt with Cloudflare DNS-01 challenges.
# DNS-01 works even when the server is behind NAT or ports aren't forwarded yet.
# Supports wildcard certs (*.woodhead.tech).
# The CF_DNS_API_TOKEN env var is loaded from /etc/traefik/cloudflare.env
certificatesResolvers:
  cloudflare:
    acme:
      # Email for Let's Encrypt registration and expiry notifications
      email: "admin@woodhead.tech"
      # Certificate storage file (must be 0600 permissions)
      storage: "/etc/traefik/acme.json"
      # DNS-01 challenge via Cloudflare API
      dnsChallenge:
        provider: cloudflare
        # Use public resolvers to verify DNS propagation
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

# --- Providers ---
# File provider watches a directory for dynamic route configurations.
# Each .yml file in the directory defines routers and services.
providers:
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# --- API / Dashboard ---
# The Traefik dashboard is available but secured behind a router
# defined in dynamic/dashboard.yml (basic auth required).
api:
  dashboard: true
  insecure: false  # Dashboard is NOT exposed without explicit router config

# --- Logging ---
log:
  level: INFO

# Access logs for debugging and monitoring
accessLog: {}
