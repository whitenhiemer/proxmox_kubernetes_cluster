# adguard.yml - Traefik route for AdGuard Home web UI
#
# Routes adguard.woodhead.tech to the AdGuard Home LXC.
# Protected by Authentik (admin access only).

http:
  routers:
    adguard:
      rule: "Host(`adguard.woodhead.tech`)"
      entryPoints:
        - websecure
      service: adguard
      tls:
        certResolver: cloudflare
      middlewares:
        - authentik@file

  services:
    adguard:
      loadBalancer:
        servers:
          - url: "http://192.168.86.35:80"
