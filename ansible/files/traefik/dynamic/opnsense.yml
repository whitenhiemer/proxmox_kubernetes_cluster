# opnsense.yml - Traefik route for OPNsense firewall management UI
#
# OPNsense web UI runs on port 443 (self-signed cert).
# This route should be INTERNAL ONLY -- do not expose the firewall
# admin interface to the internet. Use an IP whitelist middleware
# to restrict access to the management subnet.
#
# Uncomment after deploying OPNsense VM (VM ID 100, IP 10.0.0.1)

