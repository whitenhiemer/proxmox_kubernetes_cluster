#       service: opnsense
#       tls:
#         certResolver: cloudflare
#       middlewares:
#         - management-only
#
#   middlewares:
#     # Restrict access to the management subnet only
#     # Do NOT remove this -- exposing firewall admin to the internet is dangerous
#     management-only:
#       ipAllowList:
#         sourceRange:
#           - "10.0.0.0/24"
#
#   services:
#     opnsense:
#       loadBalancer:
