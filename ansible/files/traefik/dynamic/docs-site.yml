# docs-site.yml - Traefik dynamic route for the Docusaurus docs site
#
# Routes docs.woodhead.tech to the docs site container running on the
# monitoring LXC. Nginx serves pre-built Docusaurus static output on port 8081.
http:
  routers:
    docs-site:
      rule: "Host(`docs.woodhead.tech`)"
      entryPoints:
        - websecure
      service: docs-site
      tls:
        certResolver: cloudflare

  services:
    docs-site:
      loadBalancer:
        servers:
          - url: "http://192.168.86.25:8081"
