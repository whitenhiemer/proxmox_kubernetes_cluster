# resume-site.yml - Traefik dynamic route for the Hugo resume site
#
# Routes resume.woodhead.tech to the resume site container running on the
# monitoring LXC. Nginx serves pre-built Hugo static output on port 8082.
http:
  routers:
    resume-site:
      rule: "Host(`resume.woodhead.tech`)"
      entryPoints:
        - websecure
      service: resume-site
      tls:
        certResolver: cloudflare
        domains:
          - main: "*.woodhead.tech"

  services:
    resume-site:
      loadBalancer:
        servers:
          - url: "http://192.168.86.25:8082"
