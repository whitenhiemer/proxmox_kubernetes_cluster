# consulting-site.yml - Traefik dynamic route for the Astro consulting site
#
# Routes consulting.woodhead.tech to the consulting site container running on the
# monitoring LXC. Nginx serves pre-built Astro static output on port 8085.
http:
  routers:
    consulting-site:
      rule: "Host(`consulting.woodhead.tech`)"
      entryPoints:
        - websecure
      service: consulting-site
      tls:
        certResolver: cloudflare
        domains:
          - main: "*.woodhead.tech"

  services:
    consulting-site:
      loadBalancer:
        servers:
          - url: "http://192.168.86.25:8085"
