# monitoring.yml - Traefik routes for the monitoring stack
#
# Routes grafana/prometheus/alertmanager.woodhead.tech to the monitoring LXC.
# All services run in a single LXC (VM ID 205, IP 192.168.86.25) via Docker Compose.

http:
  routers:
    grafana:
      rule: "Host(`grafana.woodhead.tech`)"
      entryPoints:
        - websecure
      service: grafana
      tls:
        certResolver: cloudflare

    # Prometheus UI (admin access only -- consider adding auth middleware)
    prometheus:
      rule: "Host(`prometheus.woodhead.tech`)"
      entryPoints:
        - websecure
      service: prometheus
      tls:
        certResolver: cloudflare

    # Alertmanager UI (admin access only)
    alertmanager:
      rule: "Host(`alertmanager.woodhead.tech`)"
      entryPoints:
        - websecure
      service: alertmanager
      tls:
        certResolver: cloudflare

  services:
    grafana:
      loadBalancer:
        servers:
          - url: "http://192.168.86.25:3000"

    prometheus:
      loadBalancer:
        servers:
          - url: "http://192.168.86.25:9090"

    alertmanager:
      loadBalancer:
        servers:
          - url: "http://192.168.86.25:9093"
