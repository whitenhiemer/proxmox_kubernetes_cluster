# authentik.yml - Traefik route and forwardAuth middleware for Authentik SSO
#
# Routes auth.woodhead.tech to the Authentik login portal.
# Defines the forwardAuth middleware used by all protected services.
#
# The outpost router forwards /outpost.goauthentik.io/ paths back to Authentik
# on any woodhead.tech subdomain -- required for login redirects and callbacks
# to work when a user hits a protected service on any subdomain.
#
# To protect a service, add to its router config:
#   middlewares:
#     - authentik@file

http:
  routers:
    # Authentik login portal
    authentik:
      rule: "Host(`auth.woodhead.tech`)"
      entryPoints:
        - websecure
      service: authentik
      tls:
        certResolver: cloudflare
        domains:
          - main: "*.woodhead.tech"

    # Outpost callback handler -- routes /outpost.goauthentik.io/ on any
    # subdomain back to Authentik so login redirects and callbacks resolve
    authentik-outpost:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.woodhead.tech`) && PathPrefix(`/outpost.goauthentik.io/`)"
      entryPoints:
        - websecure
      service: authentik
      tls:
        certResolver: cloudflare
        domains:
          - main: "*.woodhead.tech"
      priority: 15

  services:
    authentik:
      loadBalancer:
        servers:
          - url: "http://192.168.86.28:9000"

  middlewares:
    authentik:
      forwardAuth:
        address: "http://192.168.86.28:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
