# openclaw.yml - OpenClaw AI agent gateway route
#
# Routes claw.woodhead.tech to the OpenClaw gateway API.

http:
  routers:
    openclaw:
      rule: "Host(`claw.woodhead.tech`)"
      entryPoints:
        - websecure
      service: openclaw
      tls:
        certResolver: cloudflare
      middlewares:
        - authelia@file

  services:
    openclaw:
      loadBalancer:
        servers:
          - url: "http://192.168.86.26:18789"
