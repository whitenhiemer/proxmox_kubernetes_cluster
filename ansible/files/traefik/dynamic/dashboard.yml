# dashboard.yml - Traefik dashboard route
#
# Exposes the Traefik dashboard at traefik.woodhead.tech.
# Protected by Authelia SSO (two_factor policy for admins group).

http:
  routers:
    traefik-dashboard:
      rule: "Host(`traefik.woodhead.tech`)"
      entryPoints:
        - websecure
      service: api@internal
      tls:
        certResolver: cloudflare
      middlewares:
        - authelia@file
