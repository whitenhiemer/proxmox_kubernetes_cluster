# arr-stack.yml - Traefik routes for the ARR media management stack
#
# Routes for Sonarr, Radarr, Prowlarr, Bazarr, Overseerr, and SABnzbd.
# All services run in a single LXC (VM ID 202, IP 192.168.86.22) via Docker Compose.

http:
  routers:
    overseerr:
      rule: "Host(`requests.woodhead.tech`)"
      entryPoints:
        - websecure
      service: overseerr
      tls:
        certResolver: cloudflare
      middlewares:
        - authelia@file

    prowlarr:
      rule: "Host(`prowlarr.woodhead.tech`)"
      entryPoints:
        - websecure
      service: prowlarr
      tls:
        certResolver: cloudflare
      middlewares:
        - authelia@file

    sonarr:
      rule: "Host(`sonarr.woodhead.tech`)"
      entryPoints:
        - websecure
      service: sonarr
      tls:
        certResolver: cloudflare
      middlewares:
        - authelia@file

    radarr:
      rule: "Host(`radarr.woodhead.tech`)"
      entryPoints:
        - websecure
      service: radarr
      tls:
        certResolver: cloudflare
      middlewares:
        - authelia@file

    bazarr:
      rule: "Host(`bazarr.woodhead.tech`)"
      entryPoints:
        - websecure
      service: bazarr
      tls:
        certResolver: cloudflare
      middlewares:
        - authelia@file

    sabnzbd:
      rule: "Host(`sabnzbd.woodhead.tech`)"
      entryPoints:
        - websecure
      service: sabnzbd
      tls:
        certResolver: cloudflare
      middlewares:
        - authelia@file

  services:
    overseerr:
      loadBalancer:
        servers:
          - url: "http://192.168.86.22:5055"

    prowlarr:
      loadBalancer:
        servers:
          - url: "http://192.168.86.22:9696"

    sonarr:
      loadBalancer:
        servers:
          - url: "http://192.168.86.22:8989"

    radarr:
      loadBalancer:
        servers:
          - url: "http://192.168.86.22:7878"

    bazarr:
      loadBalancer:
        servers:
          - url: "http://192.168.86.22:6767"

    sabnzbd:
      loadBalancer:
        servers:
          - url: "http://192.168.86.22:8080"
