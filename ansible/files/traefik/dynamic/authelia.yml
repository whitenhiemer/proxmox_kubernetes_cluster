# authelia.yml - Traefik route and forwardAuth middleware for Authelia SSO
#
# Routes auth.woodhead.tech to the Authelia login portal.
# Defines the forwardAuth middleware used by all protected services.
#
# To protect a service, add to its router config:
#   middlewares:
#     - authelia@file

http:
  routers:
    authelia:
      rule: "Host(`auth.woodhead.tech`)"
      entryPoints:
        - websecure
      service: authelia
      tls:
        certResolver: cloudflare

  services:
    authelia:
      loadBalancer:
        servers:
          - url: "http://192.168.86.27:9091"

  middlewares:
    # forwardAuth middleware -- Traefik sends every request to Authelia first.
    # If the user has a valid session cookie, Authelia returns 200 and the
    # request passes through. If not, the user is redirected to the login portal.
    authelia:
      forwardAuth:
        address: "http://192.168.86.27:9091/api/authz/forward-auth"
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Name
          - Remote-Groups
          - Remote-Email
