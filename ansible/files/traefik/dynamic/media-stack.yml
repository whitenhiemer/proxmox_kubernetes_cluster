# media-stack.yml - Traefik routes for media services
#
# Routes for Plex, Jellyfin, and TrueNAS web UIs.
# All services terminate TLS at Traefik and proxy to internal HTTP.

http:
  routers:
    # Plex web UI -- no Authelia (Plex has its own auth system)
    plex:
      rule: "Host(`plex.woodhead.tech`)"
      entryPoints:
        - websecure
      service: plex
      tls:
        certResolver: cloudflare

    # Jellyfin web UI -- no Authelia (Jellyfin has built-in auth)
    jellyfin:
      rule: "Host(`jellyfin.woodhead.tech`)"
      entryPoints:
        - websecure
      service: jellyfin
      tls:
        certResolver: cloudflare

    # TrueNAS admin UI -- protected by Authelia 2FA
    truenas:
      rule: "Host(`nas.woodhead.tech`)"
      entryPoints:
        - websecure
      service: truenas
      tls:
        certResolver: cloudflare
      middlewares:
        - authelia@file

  services:
    plex:
      loadBalancer:
        servers:
          - url: "http://192.168.86.23:32400"

    jellyfin:
      loadBalancer:
        servers:
          - url: "http://192.168.86.24:8096"

    truenas:
      loadBalancer:
        servers:
          - url: "https://192.168.86.40:443"
        serversTransport: truenas-transport

  serversTransports:
    # TrueNAS uses self-signed certs internally
    truenas-transport:
      insecureSkipVerify: true
