# media-stack.yml - Traefik routes for media services
#
# Routes for Plex, Jellyfin, and TrueNAS web UIs.
# Uncomment each section as you deploy the corresponding service.
#
# All services terminate TLS at Traefik and proxy to internal HTTP.

# --- Plex ---
# Uncomment after deploying Plex LXC (VM ID 203, IP 10.0.0.23)
# http:
#   routers:
#     plex:
#       rule: "Host(`plex.woodhead.tech`)"
#       entryPoints:
#         - websecure
#       service: plex
#       tls:
#         certResolver: cloudflare
#
#   services:
#     plex:
#       loadBalancer:
#         servers:
#           - url: "http://10.0.0.23:32400"

