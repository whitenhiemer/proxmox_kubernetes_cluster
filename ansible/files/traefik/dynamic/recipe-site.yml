# recipe-site.yml - Traefik dynamic route for the recipe site
#
# Routes recipes.woodhead.tech to the recipe site LXC container.
# The recipe site runs nginx on port 80 inside the LXC, which proxies
# to the Go app on 127.0.0.1:8080.
#
# TLS is handled by Traefik using the Cloudflare ACME resolver.
# The recipe site itself only needs to serve HTTP internally.
http:
  routers:
    # Main recipe site router
    recipe-site:
      rule: "Host(`recipes.woodhead.tech`)"
      entryPoints:
        - websecure
      service: recipe-site
      tls:
        certResolver: cloudflare
        domains:
          - main: "*.woodhead.tech"

  services:
    # Backend: recipe site LXC running nginx on port 80
    # Update the IP if your recipe site LXC has a different address
    recipe-site:
      loadBalancer:
        servers:
          - url: "http://192.168.86.21:80"
