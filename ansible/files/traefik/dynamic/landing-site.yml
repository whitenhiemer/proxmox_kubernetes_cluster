# landing-site.yml - Traefik dynamic route for the landing page
#
# Routes lab.woodhead.tech to the landing site container running on the
# monitoring LXC. Nginx serves static HTML on port 8083.
http:
  routers:
    landing-site:
      rule: "Host(`lab.woodhead.tech`)"
      entryPoints:
        - websecure
      service: landing-site
      tls:
        certResolver: cloudflare
        domains:
          - main: "*.woodhead.tech"

  services:
    landing-site:
      loadBalancer:
        servers:
          - url: "http://192.168.86.25:8083"
