# hosts.yml - Proxmox host inventory
#
# Update with your Proxmox node(s) connection details.
# These playbooks target the Proxmox hosts themselves (not the Talos VMs).
# LXC containers are listed under their respective groups for post-provision config.
all:
  children:
    # Proxmox hypervisor nodes
    proxmox:
      hosts:
        pve1:
          ansible_host: 10.0.0.10  # Update with your Proxmox node 1 IP
          ansible_user: root
        # pve2:
        #   ansible_host: 10.0.0.11
        #   ansible_user: root
        # pve3:
        #   ansible_host: 10.0.0.12
        #   ansible_user: root

    # Traefik reverse proxy LXC
    traefik:
      hosts:
        traefik-gw:
          ansible_host: 10.0.0.20  # Update with Traefik LXC IP
          ansible_user: root

    # Application LXC containers
    lxc_services:
      hosts:
        recipe-site:
          ansible_host: 10.0.0.21  # Update with recipe site LXC IP
          ansible_user: root
        arr-stack:
          ansible_host: 10.0.0.22  # ARR media stack LXC IP
          ansible_user: root
        plex-server:
          ansible_host: 10.0.0.23  # Plex Media Server LXC IP
          ansible_user: root
        jellyfin-server:
          ansible_host: 10.0.0.24  # Jellyfin Media Server LXC IP
          ansible_user: root

    # Intersection groups for service-specific playbooks (hosts: lxc_services:&<group>)
    arr:
      hosts:
        arr-stack:
    plex:
      hosts:
        plex-server:
    jellyfin:
      hosts:
        jellyfin-server:
