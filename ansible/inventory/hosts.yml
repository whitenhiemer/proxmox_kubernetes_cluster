# hosts.yml - Proxmox host inventory
#
# Update with your Proxmox node(s) connection details.
# These playbooks target the Proxmox hosts themselves (not the Talos VMs).
# LXC containers are listed under their respective groups for post-provision config.
all:
  children:
    # Proxmox hypervisor nodes
    proxmox:
      hosts:
        pve1:
          ansible_host: 192.168.86.29  # Update with your Proxmox node 1 IP
          ansible_user: root
        pve2:
          ansible_host: 192.168.86.30
          ansible_user: root
        pve3:
          ansible_host: 192.168.86.31
          ansible_user: root

    # Traefik reverse proxy LXC
    traefik:
      vars:
        ansible_ssh_private_key_file: ~/.ssh/id_ansible
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      hosts:
        traefik-gw:
          ansible_host: 192.168.86.20  # Update with Traefik LXC IP
          ansible_user: root

    # Application LXC containers
    lxc_services:
      vars:
        ansible_ssh_private_key_file: ~/.ssh/id_ansible
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
      hosts:
        recipe-site:
          ansible_host: 192.168.86.21  # Update with recipe site LXC IP
          ansible_user: root
        arr-stack:
          ansible_host: 192.168.86.22  # ARR media stack LXC IP
          ansible_user: root
        plex-server:
          ansible_host: 192.168.86.23  # Plex Media Server LXC IP
          ansible_user: root
        jellyfin-server:
          ansible_host: 192.168.86.24  # Jellyfin Media Server LXC IP
          ansible_user: root
        monitoring-stack:
          ansible_host: 192.168.86.25  # Monitoring stack LXC IP
          ansible_user: root
        openclaw:
          ansible_host: 192.168.86.26  # OpenClaw AI agent LXC IP
          ansible_user: root
        authentik:
          ansible_host: 192.168.86.28  # Authentik identity provider LXC IP
          ansible_user: root
        wireguard:
          ansible_host: 192.168.86.39  # WireGuard VPN tunnel LXC IP
          ansible_user: root
        libby-alert:
          ansible_host: 192.168.86.27  # Libby life alert website LXC IP
          ansible_user: root

    # Raspberry Pi devices (standalone, not Proxmox-managed)
    raspberry_pi:
      hosts:
        piboard:
          ansible_host: 192.168.86.131
          ansible_user: bwoodwar

    # Intersection groups for service-specific playbooks (hosts: lxc_services:&<group>)
    arr:
      hosts:
        arr-stack:
    plex:
      hosts:
        plex-server:
    jellyfin:
      hosts:
        jellyfin-server:
    monitoring:
      hosts:
        monitoring-stack:
    openclaw:
      hosts:
        openclaw:
    authentik:
      hosts:
        authentik:
    wireguard:
      hosts:
        wireguard:
    libby_alert:
      hosts:
        libby-alert:
    piboard_dashboard:
      hosts:
        piboard:
