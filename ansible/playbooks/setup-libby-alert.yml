# setup-libby-alert.yml - Deploy Libby life alert QR website
#
# This playbook configures the libby-alert LXC container:
#   1. Installs Docker CE and Docker Compose plugin
#   2. Creates service user and directory structure
#   3. Clones the libby-alert repo and builds the Docker image
#   4. Injects alert credentials from --extra-vars (not stored in git)
#   5. Deploys the Docker Compose stack and verifies health
#
# Prerequisites:
#   - libby-alert LXC created via Terraform (make apply-lxc)
#   - SSH access to the LXC
#   - Internet access for git clone + Docker image build
#   - Twilio account with a purchased phone number
#
# Usage:
#   ansible-playbook playbooks/setup-libby-alert.yml \
#     --extra-vars "twilio_account_sid=ACxxx twilio_auth_token=xxx \
#                   twilio_from_number=+1xxx alert_phone_numbers=+1xxx,+1yyy \
#                   discord_webhook=https://discord.com/api/webhooks/..."
---
- name: Deploy Libby life alert QR website
  hosts: lxc_services:&libby_alert
  vars:
    app_user: libby-alert
    app_uid: 1000
    app_gid: 1000
    app_dir: /opt/libby-alert
    app_repo: https://github.com/whitenhiemer/libby-alert.git
    compose_src: "{{ playbook_dir }}/../files/libby-alert/docker-compose.yml"
    # Alert credentials (pass via --extra-vars, NOT stored in git)
    twilio_account_sid: ""
    twilio_auth_token: ""
    twilio_from_number: ""
    alert_phone_numbers: ""
    discord_webhook: ""
    alert_cooldown_minutes: "10"

  tasks:
    # --- System Setup ---
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - wget
        state: present

    # --- Docker Installation ---
    - name: Create Docker keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set permissions on Docker GPG key
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Add Docker repository
      ansible.builtin.copy:
        content: |
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable
        dest: /etc/apt/sources.list.d/docker.list
        mode: "0644"

    - name: Install Docker CE and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # --- App User ---
    - name: Create app group
      ansible.builtin.group:
        name: "{{ app_user }}"
        gid: "{{ app_gid }}"

    - name: Create app user
      ansible.builtin.user:
        name: "{{ app_user }}"
        uid: "{{ app_uid }}"
        group: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Add app user to docker group
      ansible.builtin.user:
        name: "{{ app_user }}"
        groups: docker
        append: true

    # --- Directory Structure ---
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Create src subdirectory
      ansible.builtin.file:
        path: "{{ app_dir }}/src"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    # --- Clone and Build ---
    - name: Clone libby-alert repository
      ansible.builtin.git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dir }}/src"
        version: main
        force: true
      register: git_clone

    - name: Check if Docker image exists
      ansible.builtin.command:
        cmd: docker images libby-alert:local --format "{{ '{{' }}.Repository{{ '}}' }}"
      register: docker_images
      changed_when: false
      when: not git_clone.changed

    - name: Build Docker image
      ansible.builtin.command:
        cmd: docker build -t libby-alert:local .
        chdir: "{{ app_dir }}/src"
      when: git_clone.changed or (docker_images.stdout is defined and 'libby-alert' not in docker_images.stdout)
      changed_when: true
      timeout: 300

    # --- Inject Credentials ---
    - name: Write environment file
      ansible.builtin.copy:
        content: |
          # libby-alert environment - managed by Ansible
          # DO NOT commit this file to version control
          TWILIO_ACCOUNT_SID={{ twilio_account_sid }}
          TWILIO_AUTH_TOKEN={{ twilio_auth_token }}
          TWILIO_FROM_NUMBER={{ twilio_from_number }}
          ALERT_PHONE_NUMBERS={{ alert_phone_numbers }}
          DISCORD_WEBHOOK_URL={{ discord_webhook }}
          ALERT_COOLDOWN_MINUTES={{ alert_cooldown_minutes }}
        dest: "{{ app_dir }}/libby-alert.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"
      notify: Restart stack

    # --- Deploy ---
    - name: Copy Docker Compose file
      ansible.builtin.copy:
        src: "{{ compose_src }}"
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      notify: Restart stack

    - name: Start stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ app_dir }}"
      changed_when: true

    # --- Verify ---
    - name: Wait for service to start
      ansible.builtin.pause:
        seconds: 10

    - name: Check health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:8080/health"
        return_content: false
        status_code: 200
      register: health_check
      retries: 5
      delay: 5
      until: health_check.status == 200

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "libby-alert deployed to {{ app_dir }}"
          - "Internal URL: http://{{ ansible_host }}:8080"
          - "External URL: https://alert.woodhead.tech (after Traefik route is live)"
          - "Credentials: {{ app_dir }}/libby-alert.env"

  handlers:
    - name: Restart stack
      ansible.builtin.command:
        cmd: docker compose up -d --force-recreate
        chdir: "{{ app_dir }}"
