# setup-kanboard.yml - Deploy Kanboard project management
#
# This playbook configures the kanboard LXC container:
#   1. Installs Docker CE and Docker Compose plugin
#   2. Creates service user and directory structure
#   3. Deploys the Docker Compose stack with official Kanboard image
#   4. Verifies health
#
# Prerequisites:
#   - kanboard LXC created via Terraform (make apply-lxc)
#   - SSH access to the LXC
#   - Internet access for Docker image pull
#
# Usage:
#   ansible-playbook playbooks/setup-kanboard.yml
---
- name: Deploy Kanboard project management
  hosts: lxc_services:&kanboard
  vars:
    app_user: kanboard
    app_uid: 1000
    app_gid: 1000
    app_dir: /opt/kanboard
    compose_src: "{{ playbook_dir }}/../files/kanboard/docker-compose.yml"

  tasks:
    # --- SSH Socket Activation Fix ---
    # Debian 12.12 uses socket activation for SSH which only binds to IPv6.
    # Disable the socket unit so sshd listens on 0.0.0.0 (IPv4) directly.
    - name: Disable SSH socket activation
      ansible.builtin.systemd:
        name: ssh.socket
        enabled: false
        state: stopped
      failed_when: false

    - name: Ensure SSH listens on IPv4
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?ListenAddress "
        line: "ListenAddress 0.0.0.0"
        create: false

    # --- System Setup ---
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - wget
        state: present

    # --- Docker Installation ---
    - name: Create Docker keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set permissions on Docker GPG key
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Add Docker repository
      ansible.builtin.copy:
        content: |
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable
        dest: /etc/apt/sources.list.d/docker.list
        mode: "0644"

    - name: Install Docker CE and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # --- App User ---
    - name: Create app group
      ansible.builtin.group:
        name: "{{ app_user }}"
        gid: "{{ app_gid }}"

    - name: Create app user
      ansible.builtin.user:
        name: "{{ app_user }}"
        uid: "{{ app_uid }}"
        group: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Add app user to docker group
      ansible.builtin.user:
        name: "{{ app_user }}"
        groups: docker
        append: true

    # --- Directory Structure ---
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    # --- Deploy ---
    - name: Copy Docker Compose file
      ansible.builtin.copy:
        src: "{{ compose_src }}"
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      notify: Restart stack

    - name: Start stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ app_dir }}"
      changed_when: true

    # --- Verify ---
    - name: Wait for service to start
      ansible.builtin.pause:
        seconds: 15

    - name: Check health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:8000/login"
        return_content: false
        status_code: 200
      register: health_check
      retries: 5
      delay: 5
      until: health_check.status == 200

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Kanboard deployed to {{ app_dir }}"
          - "Internal URL: http://{{ ansible_host }}:8000"
          - "External URL: https://tasks.woodhead.tech (after Traefik route is live)"
          - "Default login: admin / admin (change immediately)"

  handlers:
    - name: Restart stack
      ansible.builtin.command:
        cmd: docker compose up -d --force-recreate
        chdir: "{{ app_dir }}"
