# setup-claude-os.yml - Deploy Claude OS on the claude-os LXC
#
# Installs Python 3.11, Node.js 20, Redis, clones the Claude OS repo,
# creates a Python venv, installs dependencies, and manages three systemd
# services: MCP/API server (8051), RQ workers, and React frontend (5173).
#
# Prerequisites:
#   - LXC 215 created via `terraform apply -target=...claude_os`
#   - SSH access to 192.168.86.37
#
# Usage (OpenAI provider):
#   make claude-os OPENAI_API_KEY=sk-...
#
# Usage (local Ollama, CPU only - slow):
#   make claude-os INSTALL_OLLAMA=true
#
# Usage (OpenAI + Ollama):
#   make claude-os OPENAI_API_KEY=sk-... INSTALL_OLLAMA=true
---
- name: Deploy Claude OS
  hosts: lxc_services:&claude_os
  vars:
    claude_os_dir: /opt/claude-os
    claude_os_repo: https://github.com/whitenhiemer/claude-os.git
    claude_os_user: claude-os
    claude_os_uid: 1001
    # LLM provider config (pass via --extra-vars, NOT stored in git)
    openai_api_key: ""
    # Set true to install Ollama for local inference (CPU-only on LXC, slow)
    install_ollama: false
    ollama_model: "llama3.2:3b"
    ollama_embed_model: "nomic-embed-text"

  tasks:
    # --- System packages ---
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install system dependencies
      ansible.builtin.apt:
        name:
          - git
          - curl
          - ca-certificates
          - gnupg
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - build-essential
          - redis-server
        state: present

    # --- Node.js 20 via NodeSource ---
    - name: Add NodeSource GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
        creates: /etc/apt/keyrings/nodesource.gpg

    - name: Add NodeSource repository
      ansible.builtin.copy:
        content: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main\n"
        dest: /etc/apt/sources.list.d/nodesource.list
        mode: "0644"

    - name: Install Node.js 20
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    # --- Redis ---
    - name: Enable and start Redis
      ansible.builtin.systemd:
        name: redis-server
        enabled: true
        state: started

    # --- Service user ---
    - name: Create claude-os group
      ansible.builtin.group:
        name: "{{ claude_os_user }}"
        gid: "{{ claude_os_uid }}"

    - name: Create claude-os user
      ansible.builtin.user:
        name: "{{ claude_os_user }}"
        uid: "{{ claude_os_uid }}"
        group: "{{ claude_os_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ claude_os_dir }}"
        create_home: false

    # --- Clone repo ---
    - name: Create base directory
      ansible.builtin.file:
        path: "{{ claude_os_dir }}"
        state: directory
        owner: "{{ claude_os_user }}"
        group: "{{ claude_os_user }}"
        mode: "0755"

    - name: Clone or update Claude OS repository
      ansible.builtin.shell: |
        git config --global --add safe.directory "{{ claude_os_dir }}" 2>/dev/null || true
        if [ -d "{{ claude_os_dir }}/.git" ]; then
          git -C "{{ claude_os_dir }}" pull
        else
          rm -rf "{{ claude_os_dir }}"
          git clone "{{ claude_os_repo }}" "{{ claude_os_dir }}"
        fi
      args:
        executable: /bin/bash
      register: git_clone
      changed_when: "'Already up to date' not in git_clone.stdout"

    - name: Create data and logs directories
      ansible.builtin.file:
        path: "{{ claude_os_dir }}/{{ item }}"
        state: directory
        owner: "{{ claude_os_user }}"
        group: "{{ claude_os_user }}"
        mode: "0755"
      loop:
        - data
        - logs

    - name: Fix ownership of repo
      ansible.builtin.file:
        path: "{{ claude_os_dir }}"
        owner: "{{ claude_os_user }}"
        group: "{{ claude_os_user }}"
        recurse: true

    # --- Python environment ---
    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv "{{ claude_os_dir }}/venv"
        creates: "{{ claude_os_dir }}/venv/bin/activate"

    - name: Install Python dependencies
      ansible.builtin.pip:
        requirements: "{{ claude_os_dir }}/requirements.txt"
        virtualenv: "{{ claude_os_dir }}/venv"
        extra_args: "--upgrade"

    # --- Frontend dependencies ---
    - name: Install npm dependencies for frontend
      ansible.builtin.command:
        cmd: npm install
        chdir: "{{ claude_os_dir }}/frontend"
      register: npm_install
      changed_when: npm_install.rc == 0

    # --- Environment config ---
    - name: Write environment file
      ansible.builtin.copy:
        content: |
          # Claude OS environment - managed by Ansible
          # DO NOT commit this file to version control
          SQLITE_DB_PATH={{ claude_os_dir }}/data/claude-os.db
          {{ 'CLAUDE_OS_PROVIDER=openai' if openai_api_key != '' else 'CLAUDE_OS_PROVIDER=local' }}
          {{ 'OPENAI_API_KEY=' + openai_api_key if openai_api_key != '' else '# OPENAI_API_KEY=' }}
          CLAUDE_OS_API=http://localhost:8051
          MCP_SERVER_HOST=0.0.0.0
          MCP_SERVER_PORT=8051
        dest: "{{ claude_os_dir }}/.env"
        owner: "{{ claude_os_user }}"
        group: "{{ claude_os_user }}"
        mode: "0600"
      notify:
        - Restart claude-os-api
        - Restart claude-os-workers

    # --- Systemd: MCP/API server ---
    - name: Install claude-os-api systemd service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Claude OS MCP/API Server
          After=network.target redis-server.service
          Requires=redis-server.service

          [Service]
          Type=simple
          User={{ claude_os_user }}
          Group={{ claude_os_user }}
          WorkingDirectory={{ claude_os_dir }}/mcp_server
          EnvironmentFile={{ claude_os_dir }}/.env
          ExecStart={{ claude_os_dir }}/venv/bin/python3 server.py
          Restart=on-failure
          RestartSec=5
          StandardOutput=append:{{ claude_os_dir }}/logs/mcp_server.log
          StandardError=append:{{ claude_os_dir }}/logs/mcp_server.log

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/claude-os-api.service
        mode: "0644"
      notify: Reload systemd

    # --- Systemd: RQ workers ---
    - name: Install claude-os-workers systemd service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Claude OS RQ Workers (real-time learning)
          After=network.target redis-server.service claude-os-api.service
          Requires=redis-server.service

          [Service]
          Type=simple
          User={{ claude_os_user }}
          Group={{ claude_os_user }}
          WorkingDirectory={{ claude_os_dir }}
          EnvironmentFile={{ claude_os_dir }}/.env
          ExecStart={{ claude_os_dir }}/venv/bin/rq worker claude-os:learning claude-os:prompts claude-os:ingest --with-scheduler
          Restart=on-failure
          RestartSec=5
          StandardOutput=append:{{ claude_os_dir }}/logs/rq_workers.log
          StandardError=append:{{ claude_os_dir }}/logs/rq_workers.log

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/claude-os-workers.service
        mode: "0644"
      notify: Reload systemd

    # --- Systemd: React frontend ---
    - name: Install claude-os-frontend systemd service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Claude OS React Frontend (Vite dev server)
          After=network.target claude-os-api.service

          [Service]
          Type=simple
          User={{ claude_os_user }}
          Group={{ claude_os_user }}
          WorkingDirectory={{ claude_os_dir }}/frontend
          EnvironmentFile={{ claude_os_dir }}/.env
          ExecStart=/usr/bin/npm run dev -- --host 0.0.0.0
          Restart=on-failure
          RestartSec=5
          StandardOutput=append:{{ claude_os_dir }}/logs/frontend.log
          StandardError=append:{{ claude_os_dir }}/logs/frontend.log

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/claude-os-frontend.service
        mode: "0644"
      notify: Reload systemd

    # --- Enable and start services ---
    - name: Enable and start claude-os services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: true
      loop:
        - claude-os-api
        - claude-os-workers
        - claude-os-frontend

    # --- Optional: Ollama ---
    - name: Install zstd (required by Ollama installer)
      ansible.builtin.apt:
        name: zstd
        state: present
      when: install_ollama | bool

    - name: Install Ollama (for local inference)
      ansible.builtin.shell:
        cmd: curl -fsSL https://ollama.ai/install.sh | sh
        creates: /usr/local/bin/ollama
      when: install_ollama | bool

    - name: Enable and start Ollama service
      ansible.builtin.systemd:
        name: ollama
        enabled: true
        state: started
      when: install_ollama | bool

    - name: Pull Ollama models
      ansible.builtin.shell:
        cmd: ollama pull {{ item }}
      loop:
        - "{{ ollama_model }}"
        - "{{ ollama_embed_model }}"
      when: install_ollama | bool
      changed_when: true
      timeout: 600

    # --- Verify ---
    - name: Wait for API server to start
      ansible.builtin.uri:
        url: "http://127.0.0.1:8051/docs"
        status_code: 200
      register: api_health
      retries: 12
      delay: 5
      until: api_health.status == 200

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Claude OS deployed to {{ claude_os_dir }}"
          - "Provider: {{ 'openai' if openai_api_key != '' else 'local (Ollama)' }}"
          - ""
          - "Service URLs (internal):"
          - "  API/MCP:  http://{{ ansible_host }}:8051"
          - "  API docs: http://{{ ansible_host }}:8051/docs"
          - "  Frontend: http://{{ ansible_host }}:5173"
          - ""
          - "External (via Traefik):"
          - "  https://claude-os.woodhead.tech"
          - ""
          - "Claude Code MCP config (~/.claude/settings.json on your machine):"
          - "  { \"mcpServers\": { \"code-forge\": { \"command\": \"curl\", ... } } }"
          - "  See: http://{{ ansible_host }}:8051/docs for MCP setup"
          - ""
          - "Logs: ssh root@{{ ansible_host }} 'journalctl -u claude-os-api -f'"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart claude-os-api
      ansible.builtin.systemd:
        name: claude-os-api
        state: restarted

    - name: Restart claude-os-workers
      ansible.builtin.systemd:
        name: claude-os-workers
        state: restarted
