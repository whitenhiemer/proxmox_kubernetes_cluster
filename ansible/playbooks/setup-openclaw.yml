# setup-openclaw.yml - Install Docker, build OpenClaw from source, and deploy
#
# This playbook configures the OpenClaw LXC container:
#   1. Installs Docker CE, Docker Compose plugin, and git
#   2. Creates service user and directory structure
#   3. Clones the OpenClaw repo and builds the Docker image
#   4. Deploys the Docker Compose file
#   5. Injects LLM API keys from --extra-vars (not stored in git)
#   6. Starts the stack and verifies health
#
# Prerequisites:
#   - OpenClaw LXC created via Terraform (make apply-lxc)
#   - SSH access to the LXC (key injected by Terraform)
#   - Internet access for git clone + Docker image builds
#   - At least one LLM API key
#
# Usage:
#   ansible-playbook playbooks/setup-openclaw.yml \
#     --extra-vars "anthropic_api_key=sk-ant-..."
#
# With multiple providers:
#   ansible-playbook playbooks/setup-openclaw.yml \
#     --extra-vars "anthropic_api_key=sk-ant-... openai_api_key=sk-... gateway_token=my-token"
---
- name: Deploy OpenClaw AI agent framework
  hosts: lxc_services:&openclaw
  vars:
    openclaw_user: openclaw
    openclaw_uid: 1000
    openclaw_gid: 1000
    openclaw_base_dir: /opt/openclaw
    openclaw_src_dir: /opt/openclaw/src
    openclaw_repo: https://github.com/openclaw/openclaw.git
    compose_src: "{{ playbook_dir }}/../files/openclaw/docker-compose.yml"
    # LLM API keys (pass via --extra-vars, NOT stored in git)
    anthropic_api_key: ""
    openai_api_key: ""
    gemini_api_key: ""
    openrouter_api_key: ""
    gateway_token: ""
    # Channel bot tokens (optional)
    discord_bot_token: ""
    slack_bot_token: ""
    telegram_bot_token: ""

  tasks:
    # --- System Setup ---
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
        state: present

    # --- Docker Installation ---
    # Following official Docker CE install for Debian
    - name: Create Docker keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set permissions on Docker GPG key
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Add Docker repository
      ansible.builtin.copy:
        content: |
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable
        dest: /etc/apt/sources.list.d/docker.list
        mode: "0644"

    - name: Install Docker CE and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # --- OpenClaw User ---
    - name: Create OpenClaw group
      ansible.builtin.group:
        name: "{{ openclaw_user }}"
        gid: "{{ openclaw_gid }}"

    - name: Create OpenClaw user
      ansible.builtin.user:
        name: "{{ openclaw_user }}"
        uid: "{{ openclaw_uid }}"
        group: "{{ openclaw_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Add OpenClaw user to docker group
      ansible.builtin.user:
        name: "{{ openclaw_user }}"
        groups: docker
        append: true

    # --- Directory Structure ---
    - name: Create OpenClaw base directory
      ansible.builtin.file:
        path: "{{ openclaw_base_dir }}"
        state: directory
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: "0755"

    - name: Create OpenClaw subdirectories
      ansible.builtin.file:
        path: "{{ openclaw_base_dir }}/{{ item }}"
        state: directory
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: "0755"
      loop:
        - config
        - workspace

    # --- Clone and Build ---
    - name: Clone OpenClaw repository
      ansible.builtin.git:
        repo: "{{ openclaw_repo }}"
        dest: "{{ openclaw_src_dir }}"
        version: main
        force: true
      register: git_clone

    - name: Build OpenClaw Docker image
      ansible.builtin.command:
        cmd: docker build -t openclaw:local .
        chdir: "{{ openclaw_src_dir }}"
      when: git_clone.changed or (docker_images.stdout is defined and 'openclaw' not in docker_images.stdout)
      changed_when: true
      register: docker_build
      timeout: 600

    - name: Check if OpenClaw image exists (first run)
      ansible.builtin.command:
        cmd: docker images openclaw:local --format "{{ '{{' }}.Repository{{ '}}' }}"
      register: docker_images
      changed_when: false
      when: not git_clone.changed

    - name: Build OpenClaw Docker image (first run, no git change)
      ansible.builtin.command:
        cmd: docker build -t openclaw:local .
        chdir: "{{ openclaw_src_dir }}"
      when: not git_clone.changed and docker_images.stdout == ""
      changed_when: true
      timeout: 600

    # --- Inject Credentials ---
    # API keys written to env file, never committed to git
    - name: Write OpenClaw environment file
      ansible.builtin.copy:
        # Build env file content with conditional API key inclusion
        content: |
          # OpenClaw environment - managed by Ansible
          # DO NOT commit this file to version control
          {{ 'ANTHROPIC_API_KEY=' + anthropic_api_key if anthropic_api_key != '' else '# ANTHROPIC_API_KEY=' }}
          {{ 'OPENAI_API_KEY=' + openai_api_key if openai_api_key != '' else '# OPENAI_API_KEY=' }}
          {{ 'GEMINI_API_KEY=' + gemini_api_key if gemini_api_key != '' else '# GEMINI_API_KEY=' }}
          {{ 'OPENROUTER_API_KEY=' + openrouter_api_key if openrouter_api_key != '' else '# OPENROUTER_API_KEY=' }}
          {{ 'OPENCLAW_GATEWAY_TOKEN=' + gateway_token if gateway_token != '' else '# OPENCLAW_GATEWAY_TOKEN=' }}
          {{ 'DISCORD_BOT_TOKEN=' + discord_bot_token if discord_bot_token != '' else '# DISCORD_BOT_TOKEN=' }}
          {{ 'SLACK_BOT_TOKEN=' + slack_bot_token if slack_bot_token != '' else '# SLACK_BOT_TOKEN=' }}
          {{ 'TELEGRAM_BOT_TOKEN=' + telegram_bot_token if telegram_bot_token != '' else '# TELEGRAM_BOT_TOKEN=' }}
        dest: "{{ openclaw_base_dir }}/openclaw.env"
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: "0600"
      notify: Restart OpenClaw stack

    # --- Deploy Docker Compose ---
    - name: Copy Docker Compose file
      ansible.builtin.copy:
        src: "{{ compose_src }}"
        dest: "{{ openclaw_base_dir }}/docker-compose.yml"
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: "0644"
      notify: Restart OpenClaw stack

    # --- Start Stack ---
    - name: Start OpenClaw stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ openclaw_base_dir }}"
      changed_when: true

    # --- Verify ---
    - name: Wait for gateway to start
      ansible.builtin.pause:
        seconds: 15

    - name: Check gateway health
      ansible.builtin.uri:
        url: "http://127.0.0.1:18789/healthz"
        return_content: true
        status_code: 200
      register: health_check
      retries: 5
      delay: 10
      until: health_check.status == 200

    - name: Check running containers
      ansible.builtin.command:
        cmd: docker compose ps --format json
        chdir: "{{ openclaw_base_dir }}"
      register: compose_status
      changed_when: false

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "OpenClaw deployed to {{ openclaw_base_dir }}"
          - "Source: {{ openclaw_src_dir }}"
          - "Compose file: {{ openclaw_base_dir }}/docker-compose.yml"
          - "Credentials: {{ openclaw_base_dir }}/openclaw.env"
          - ""
          - "Service URLs (internal):"
          - "  Gateway API: http://{{ ansible_host }}:18789"
          - "  Bridge:      http://{{ ansible_host }}:18790"
          - "  Health:      http://{{ ansible_host }}:18789/healthz"
          - ""
          - "After Traefik route is uncommented:"
          - "  Gateway: https://claw.woodhead.tech"
          - ""
          - "Interactive CLI:"
          - "  ssh root@{{ ansible_host }}"
          - "  docker attach openclaw-cli"
          - ""
          - "To update OpenClaw:"
          - "  Re-run this playbook (pulls latest, rebuilds image)"

  handlers:
    - name: Restart OpenClaw stack
      ansible.builtin.command:
        cmd: docker compose up -d --force-recreate
        chdir: "{{ openclaw_base_dir }}"
