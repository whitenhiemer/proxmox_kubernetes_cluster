# setup-adguard.yml - Install and configure AdGuard Home in its LXC
#
# Deploys AdGuard Home as the internal DNS server for the homelab LAN.
# After deploy:
#   1. Complete initial setup at http://192.168.86.35:3000
#   2. Set the DNS port to 53 during setup wizard
#   3. Set admin password and configure upstream DNS (e.g. 1.1.1.1, 8.8.8.8)
#   4. Add DNS rewrites for workstations and internal services
#   5. Point Google Nest upstream DNS to 192.168.86.35
#
# Usage: ansible-playbook playbooks/setup-adguard.yml

---
- name: Configure AdGuard Home DNS server
  hosts: adguard
  vars:
    adguard_version: "v0.107.57"
    adguard_arch: "linux_amd64"
    adguard_install_dir: "/opt/adguardhome"
    adguard_data_dir: "/opt/adguardhome/data"
    adguard_user: "adguard"
    adguard_group: "adguard"

  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true

    - name: Create adguard system user
      ansible.builtin.user:
        name: "{{ adguard_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create AdGuard directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ adguard_user }}"
        group: "{{ adguard_group }}"
        mode: "0755"
      loop:
        - "{{ adguard_install_dir }}"
        - "{{ adguard_data_dir }}"

    - name: Check if AdGuard Home is already installed
      ansible.builtin.stat:
        path: "{{ adguard_install_dir }}/AdGuardHome"
      register: adguard_installed

    - name: Download AdGuard Home
      ansible.builtin.get_url:
        url: "https://github.com/AdguardTeam/AdGuardHome/releases/download/{{ adguard_version }}/AdGuardHome_{{ adguard_arch }}.tar.gz"
        dest: /tmp/adguardhome.tar.gz
        mode: "0644"
        timeout: 120
      when: not adguard_installed.stat.exists

    - name: Extract AdGuard Home
      ansible.builtin.unarchive:
        src: /tmp/adguardhome.tar.gz
        dest: /tmp/
        remote_src: true
      when: not adguard_installed.stat.exists

    - name: Install AdGuard Home binary
      ansible.builtin.copy:
        src: /tmp/AdGuardHome/AdGuardHome
        dest: "{{ adguard_install_dir }}/AdGuardHome"
        owner: "{{ adguard_user }}"
        group: "{{ adguard_group }}"
        mode: "0755"
        remote_src: true
      when: not adguard_installed.stat.exists

    - name: Clean up download
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/adguardhome.tar.gz
        - /tmp/AdGuardHome

    # Allow AdGuard to bind to port 53 without root
    - name: Set cap_net_bind_service on AdGuard binary
      community.general.capabilities:
        path: "{{ adguard_install_dir }}/AdGuardHome"
        capability: cap_net_bind_service=+ep
        state: present
      failed_when: false

    - name: Deploy AdGuard Home systemd service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=AdGuard Home - Network-wide ad blocker and DNS server
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ adguard_user }}
          Group={{ adguard_group }}
          ExecStart={{ adguard_install_dir }}/AdGuardHome \
            --config {{ adguard_data_dir }}/AdGuardHome.yaml \
            --work-dir {{ adguard_data_dir }} \
            --no-check-update
          Restart=on-failure
          RestartSec=5

          AmbientCapabilities=CAP_NET_BIND_SERVICE
          CapabilityBoundingSet=CAP_NET_BIND_SERVICE
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/adguardhome.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart AdGuard

    - name: Enable and start AdGuard Home
      ansible.builtin.systemd:
        name: adguardhome
        enabled: true
        state: started

    - name: Show next steps
      ansible.builtin.debug:
        msg:
          - "AdGuard Home is running. Complete setup at http://192.168.86.35:3000"
          - "During setup wizard: set DNS port to 53, web UI port to 80"
          - "Recommended upstream DNS: https://dns.cloudflare.com/dns-query (DoH)"
          - "After setup: point Google Nest upstream DNS to 192.168.86.35"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart AdGuard
      ansible.builtin.systemd:
        name: adguardhome
        state: restarted
