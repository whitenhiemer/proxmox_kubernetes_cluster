# patch-pi.yml - Patch Raspberry Pi devices
#
# Runs apt update + apt upgrade on all Raspberry Pi hosts.
# Restarts piboard service if it exists.
#
# Usage:
#   cd ansible && ansible-playbook playbooks/patch-pi.yml
#   cd ansible && ansible-playbook playbooks/patch-pi.yml --limit piboard
#   cd ansible && ansible-playbook playbooks/patch-pi.yml --limit klipper

---
- name: Patch Raspberry Pi devices
  hosts: raspberry_pi:klipper
  become: true
  gather_facts: true

  tasks:
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: safe
      register: apt_upgrade

    - name: Show upgraded packages
      ansible.builtin.debug:
        msg: "{{ apt_upgrade.stdout_lines | default(['No packages upgraded']) }}"
      when: apt_upgrade.changed

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 120
        msg: "Rebooting for kernel/package updates"
      when: reboot_required.stat.exists

    - name: Clean up old packages
      ansible.builtin.apt:
        autoremove: true
        autoclean: true
