# setup-wireguard.yml - Install and configure WireGuard VPN tunnel
#
# This playbook configures the WireGuard LXC container:
#   1. Installs WireGuard and iptables
#   2. Enables IP forwarding (net.ipv4.ip_forward=1)
#   3. Generates server keypair and per-client keypairs
#   4. Generates preshared keys for post-quantum resistance
#   5. Templates wg0.conf with all peers
#   6. Generates client .conf files for import into WireGuard apps
#   7. Starts wg-quick@wg0 and verifies the tunnel
#
# Prerequisites:
#   - WireGuard LXC created via Terraform (make apply-lxc)
#   - SSH access to the LXC (key injected by Terraform)
#   - Public hostname or DDNS domain for the endpoint
#
# Usage:
#   ansible-playbook playbooks/setup-wireguard.yml
#
# With custom endpoint (default: woodhead.tech):
#   ansible-playbook playbooks/setup-wireguard.yml \
#     --extra-vars "wg_endpoint=vpn.woodhead.tech"
#
# Client configs are written to /etc/wireguard/clients/ on the LXC
# and fetched to ansible/files/wireguard/clients/ locally.
---
- name: Deploy WireGuard VPN tunnel
  hosts: lxc_services:&wireguard
  vars:
    # WireGuard network config
    wg_port: 51820
    wg_subnet: "10.10.0.0/24"
    wg_server_ip: "10.10.0.1"
    wg_dns: "192.168.86.1"
    wg_endpoint: "woodhead.tech"
    # AllowedIPs: route all LAN + VPN traffic through tunnel
    # Use 0.0.0.0/0 for full tunnel, or specific subnets for split tunnel
    wg_allowed_ips: "192.168.86.0/24, 10.10.0.0/24"

    # Client definitions -- add more entries to provision additional peers
    wg_client_list:
      - name: brandon-laptop
        ip: "10.10.0.2"
      - name: brandon-phone
        ip: "10.10.0.3"
      - name: lenovo-go
        ip: "10.10.0.4"
      - name: mango-travel
        ip: "10.10.0.10"

    wg_config_dir: /etc/wireguard
    wg_client_dir: /etc/wireguard/clients
    local_client_dir: "{{ playbook_dir }}/../files/wireguard/clients"

    # Jinja2 templates
    server_template: "{{ playbook_dir }}/../files/wireguard/wg0.conf.j2"
    client_template: "{{ playbook_dir }}/../files/wireguard/client.conf.j2"

  tasks:
    # --- System Setup ---
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install WireGuard and dependencies
      ansible.builtin.apt:
        name:
          - wireguard
          - wireguard-tools
          - iptables
          - qrencode
        state: present

    # --- IP Forwarding ---
    - name: Enable IPv4 forwarding (persistent)
      ansible.builtin.copy:
        content: |
          # Enable IP forwarding for WireGuard VPN tunnel
          net.ipv4.ip_forward = 1
        dest: /etc/sysctl.d/99-wireguard.conf
        mode: "0644"
      notify: Apply sysctl

    - name: Enable IPv4 forwarding (immediate)
      ansible.builtin.command:
        cmd: sysctl -w net.ipv4.ip_forward=1
      changed_when: false

    # --- Key Generation ---
    - name: Create WireGuard config directory
      ansible.builtin.file:
        path: "{{ wg_config_dir }}"
        state: directory
        mode: "0700"

    - name: Create client config directory
      ansible.builtin.file:
        path: "{{ wg_client_dir }}"
        state: directory
        mode: "0700"

    # Server keypair
    - name: Generate server private key
      ansible.builtin.shell:
        cmd: wg genkey
        creates: "{{ wg_config_dir }}/server_private.key"
      register: server_privkey_gen
      no_log: true

    - name: Save server private key
      ansible.builtin.copy:
        content: "{{ server_privkey_gen.stdout }}"
        dest: "{{ wg_config_dir }}/server_private.key"
        mode: "0600"
      when: server_privkey_gen.changed
      no_log: true

    - name: Read server private key
      ansible.builtin.slurp:
        src: "{{ wg_config_dir }}/server_private.key"
      register: server_privkey_file
      no_log: true

    - name: Set server private key fact
      ansible.builtin.set_fact:
        wg_server_private_key: "{{ server_privkey_file.content | b64decode | trim }}"
      no_log: true

    - name: Derive server public key
      ansible.builtin.shell:
        cmd: "echo '{{ wg_server_private_key }}' | wg pubkey"
      register: server_pubkey_result
      changed_when: false
      no_log: true

    - name: Set server public key fact
      ansible.builtin.set_fact:
        wg_server_public_key: "{{ server_pubkey_result.stdout | trim }}"

    # Client keypairs + preshared keys
    - name: Generate client private keys
      ansible.builtin.shell:
        cmd: wg genkey
        creates: "{{ wg_config_dir }}/{{ item.name }}_private.key"
      loop: "{{ wg_client_list }}"
      register: client_privkey_results
      no_log: true

    - name: Save client private keys
      ansible.builtin.copy:
        content: "{{ item.stdout }}"
        dest: "{{ wg_config_dir }}/{{ item.item.name }}_private.key"
        mode: "0600"
      loop: "{{ client_privkey_results.results }}"
      when: item.changed
      no_log: true

    - name: Generate client preshared keys
      ansible.builtin.shell:
        cmd: wg genpsk
        creates: "{{ wg_config_dir }}/{{ item.name }}_preshared.key"
      loop: "{{ wg_client_list }}"
      register: client_psk_results
      no_log: true

    - name: Save client preshared keys
      ansible.builtin.copy:
        content: "{{ item.stdout }}"
        dest: "{{ wg_config_dir }}/{{ item.item.name }}_preshared.key"
        mode: "0600"
      loop: "{{ client_psk_results.results }}"
      when: item.changed
      no_log: true

    # Read all client keys into facts
    - name: Read client private keys
      ansible.builtin.slurp:
        src: "{{ wg_config_dir }}/{{ item.name }}_private.key"
      loop: "{{ wg_client_list }}"
      register: client_privkeys
      no_log: true

    - name: Read client preshared keys
      ansible.builtin.slurp:
        src: "{{ wg_config_dir }}/{{ item.name }}_preshared.key"
      loop: "{{ wg_client_list }}"
      register: client_psks
      no_log: true

    - name: Derive client public keys
      ansible.builtin.shell:
        cmd: "echo '{{ item.content | b64decode | trim }}' | wg pubkey"
      loop: "{{ client_privkeys.results }}"
      register: client_pubkeys
      changed_when: false
      no_log: true

    # Build structured client list with all keys
    - name: Build client key map
      ansible.builtin.set_fact:
        wg_clients: >-
          {{
            wg_clients | default([]) + [{
              'name': wg_client_list[idx].name,
              'ip': wg_client_list[idx].ip,
              'private_key': client_privkeys.results[idx].content | b64decode | trim,
              'public_key': client_pubkeys.results[idx].stdout | trim,
              'preshared_key': client_psks.results[idx].content | b64decode | trim
            }]
          }}
      loop: "{{ wg_client_list }}"
      loop_control:
        index_var: idx
      no_log: true

    # --- Deploy Server Config ---
    - name: Template wg0.conf
      ansible.builtin.template:
        src: "{{ server_template }}"
        dest: "{{ wg_config_dir }}/wg0.conf"
        mode: "0600"
      notify: Restart WireGuard

    # --- Generate Client Configs ---
    - name: Template client configs
      ansible.builtin.template:
        src: "{{ client_template }}"
        dest: "{{ wg_client_dir }}/{{ item.name }}.conf"
        mode: "0600"
      vars:
        client_name: "{{ item.name }}"
        client_ip: "{{ item.ip }}"
        client_private_key: "{{ item.private_key }}"
        client_preshared_key: "{{ item.preshared_key }}"
      loop: "{{ wg_clients }}"
      no_log: true

    # Generate QR codes for mobile clients
    - name: Generate QR codes for client configs
      ansible.builtin.shell:
        cmd: "qrencode -t ansiutf8 < {{ wg_client_dir }}/{{ item.name }}.conf > {{ wg_client_dir }}/{{ item.name }}.qr"
      loop: "{{ wg_client_list }}"
      changed_when: true

    # --- Start WireGuard ---
    - name: Enable and start wg-quick@wg0
      ansible.builtin.systemd:
        name: wg-quick@wg0
        enabled: true
        state: started

    # --- Verify ---
    - name: Show WireGuard interface status
      ansible.builtin.command:
        cmd: wg show
      register: wg_status
      changed_when: false

    - name: Verify wg0 interface is up
      ansible.builtin.assert:
        that:
          - "'wg0' in wg_status.stdout"
        fail_msg: "WireGuard interface wg0 is not up"
        success_msg: "WireGuard interface wg0 is running"

    # --- Fetch Client Configs Locally ---
    - name: Create local client config directory
      ansible.builtin.file:
        path: "{{ local_client_dir }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: Fetch client configs to local machine
      ansible.builtin.fetch:
        src: "{{ wg_client_dir }}/{{ item.name }}.conf"
        dest: "{{ local_client_dir }}/{{ item.name }}.conf"
        flat: true
      loop: "{{ wg_client_list }}"

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "WireGuard VPN deployed to {{ ansible_host }}"
          - ""
          - "Server: {{ wg_server_ip }} on UDP {{ wg_port }}"
          - "Endpoint: {{ wg_endpoint }}:{{ wg_port }}"
          - "VPN subnet: {{ wg_subnet }}"
          - ""
          - "Clients:"
          - "{% for c in wg_client_list %}  {{ c.name }}: {{ c.ip }}\n{% endfor %}"
          - "Client configs fetched to: ansible/files/wireguard/clients/"
          - ""
          - "NEXT STEPS:"
          - "  1. Port forward UDP {{ wg_port }} on Google Nest -> {{ ansible_host }}"
          - "  2. Import .conf files into WireGuard app on your devices"
          - "  3. For phone: SSH to {{ ansible_host }}, cat {{ wg_client_dir }}/brandon-phone.qr"
          - "     and scan the QR code with the WireGuard app"
          - "  4. Test: connect VPN, then curl http://192.168.86.20 (Traefik)"

  handlers:
    - name: Apply sysctl
      # Only apply our wireguard sysctl file -- `sysctl --system` fails in LXC
      # because it also tries to apply kernel params the container can't modify.
      ansible.builtin.command:
        cmd: sysctl -p /etc/sysctl.d/99-wireguard.conf
      changed_when: true

    - name: Restart WireGuard
      ansible.builtin.systemd:
        name: wg-quick@wg0
        state: restarted
