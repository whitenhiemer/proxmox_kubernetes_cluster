# prepare-opnsense.yml - Download OPNsense ISO to Proxmox storage
#
# Downloads the OPNsense DVD installer ISO to the Proxmox node so Terraform
# can reference it when creating the firewall VM.
#
# The DVD image is used (not the serial/vga variants) because it includes
# the full installer with a console menu for initial setup.
#
# Usage: ansible-playbook playbooks/prepare-opnsense.yml
---
- name: Download OPNsense ISO to Proxmox
  hosts: proxmox[0]  # Only need it on one node
  vars:
    # OPNsense release version -- update as new versions are released
    # Check https://opnsense.org/download/ for the latest
    opnsense_version: "24.7"
    opnsense_arch: "amd64"
    iso_storage: "local"
    iso_filename: "OPNsense-dvd-{{ opnsense_arch }}.iso"
    # OPNsense distributes as .bz2 compressed ISOs
    opnsense_mirror: "https://mirror.ams1.nl.leaseweb.net/opnsense/releases"
    opnsense_iso_url: "{{ opnsense_mirror }}/{{ opnsense_version }}/OPNsense-{{ opnsense_version }}-dvd-{{ opnsense_arch }}.iso.bz2"

  tasks:
    - name: Check if OPNsense ISO already exists
      ansible.builtin.stat:
        path: "/var/lib/vz/template/iso/{{ iso_filename }}"
      register: iso_file

    - name: Download OPNsense ISO (compressed)
      ansible.builtin.get_url:
        url: "{{ opnsense_iso_url }}"
        dest: "/tmp/opnsense.iso.bz2"
        mode: "0644"
        timeout: 600
      when: not iso_file.stat.exists

    - name: Install bzip2 for decompression
      ansible.builtin.apt:
        name: bzip2
        state: present
      when: not iso_file.stat.exists

    - name: Decompress OPNsense ISO
      ansible.builtin.command:
        cmd: "bzip2 -dk /tmp/opnsense.iso.bz2"
      when: not iso_file.stat.exists
      changed_when: true

    - name: Move ISO to Proxmox storage
      ansible.builtin.command:
        cmd: "mv /tmp/opnsense.iso /var/lib/vz/template/iso/{{ iso_filename }}"
      when: not iso_file.stat.exists
      changed_when: true

    - name: Clean up compressed download
      ansible.builtin.file:
        path: "/tmp/opnsense.iso.bz2"
        state: absent

    - name: Verify ISO exists on Proxmox storage
      ansible.builtin.command:
        cmd: "pvesm list {{ iso_storage }} --content iso"
      register: iso_list
      changed_when: false

    - name: Confirm OPNsense ISO is available
      ansible.builtin.assert:
        that:
          - "iso_filename in iso_list.stdout"
        fail_msg: "OPNsense ISO not found in Proxmox storage"
        success_msg: "OPNsense {{ opnsense_version }} ISO ready at {{ iso_storage }}:iso/{{ iso_filename }}"
