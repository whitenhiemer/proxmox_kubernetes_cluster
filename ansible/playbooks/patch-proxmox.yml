# patch-proxmox.yml - Patch Proxmox VE hosts
#
# Runs apt update + apt dist-upgrade on Proxmox hosts.
# Uses serial:1 to patch one host at a time -- critical for cluster stability.
# Does NOT auto-reboot; warns if a reboot is required.
#
# Usage:
#   cd ansible && ansible-playbook playbooks/patch-proxmox.yml
#   cd ansible && ansible-playbook playbooks/patch-proxmox.yml --limit pve1

---
- name: Patch Proxmox VE hosts
  hosts: proxmox
  become: true
  gather_facts: true
  serial: 1  # One host at a time for cluster safety

  tasks:
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0

    # dist-upgrade handles Proxmox kernel and dependency transitions
    - name: Upgrade all packages (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
      register: apt_upgrade

    - name: Show upgraded packages
      ansible.builtin.debug:
        msg: "{{ apt_upgrade.stdout_lines | default(['No packages upgraded']) }}"
      when: apt_upgrade.changed

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Warn if reboot is needed
      ansible.builtin.debug:
        msg: >
          WARNING: {{ inventory_hostname }} requires a reboot to complete updates.
          Run manually: ssh root@{{ ansible_host }} "reboot"
          Wait for the node to rejoin the cluster before patching the next host.
      when: reboot_required.stat.exists

    - name: Clean up old packages
      ansible.builtin.apt:
        autoremove: true
        autoclean: true

    - name: Show current Proxmox version
      ansible.builtin.command:
        cmd: pveversion
      register: pve_version
      changed_when: false

    - name: Patch summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }} ({{ ansible_host }})"
          - "Version: {{ pve_version.stdout }}"
          - "Packages upgraded: {{ 'yes' if apt_upgrade.changed else 'no' }}"
          - "Reboot required: {{ 'YES' if reboot_required.stat.exists else 'no' }}"
