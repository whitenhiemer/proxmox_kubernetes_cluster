# setup-authelia.yml - Install Docker and deploy Authelia SSO gateway
#
# This playbook configures the Authelia LXC container:
#   1. Installs Docker CE and Docker Compose plugin
#   2. Creates directory structure and service user
#   3. Generates cryptographic secrets (JWT, session, storage encryption)
#   4. Hashes the admin password with argon2id
#   5. Deploys Authelia config, user database, and Docker Compose
#   6. Starts the stack and verifies health
#
# Prerequisites:
#   - Authelia LXC created via Terraform (make apply-lxc)
#   - SSH access to the LXC (key injected by Terraform)
#   - Internet access for Docker image pulls
#
# Usage:
#   ansible-playbook playbooks/setup-authelia.yml \
#     --extra-vars "authelia_admin_password=your-strong-password"
---
- name: Deploy Authelia SSO gateway
  hosts: lxc_services:&authelia
  vars:
    auth_user: authelia
    auth_uid: 1000
    auth_gid: 1000
    auth_base_dir: /opt/authelia
    compose_src: "{{ playbook_dir }}/../files/authelia/docker-compose.yml"
    config_src: "{{ playbook_dir }}/../files/authelia/configuration.yml"
    users_src: "{{ playbook_dir }}/../files/authelia/users_database.yml"
    # Required: set via --extra-vars
    authelia_admin_password: ""

  tasks:
    # --- Validate Input ---
    - name: Verify admin password was provided
      ansible.builtin.fail:
        msg: "authelia_admin_password is required. Pass via --extra-vars \"authelia_admin_password=...\""
      when: authelia_admin_password == ""

    # --- SSH Socket Activation Fix ---
    # Debian 12.12 uses socket activation for SSH which only binds to IPv6.
    # Disable the socket unit so sshd listens on 0.0.0.0 (IPv4) directly.
    - name: Disable SSH socket activation
      ansible.builtin.systemd:
        name: ssh.socket
        enabled: false
        state: stopped
      failed_when: false

    - name: Ensure SSH listens on IPv4
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?ListenAddress "
        line: "ListenAddress 0.0.0.0"
        create: false

    - name: Restart SSH service
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    # --- System Setup ---
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - openssl
        state: present

    # --- Docker Installation ---
    # Following official Docker CE install for Debian
    - name: Create Docker keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set permissions on Docker GPG key
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Add Docker repository
      ansible.builtin.copy:
        content: |
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable
        dest: /etc/apt/sources.list.d/docker.list
        mode: "0644"

    - name: Install Docker CE and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # --- Authelia User ---
    - name: Create authelia group
      ansible.builtin.group:
        name: "{{ auth_user }}"
        gid: "{{ auth_gid }}"

    - name: Create authelia user
      ansible.builtin.user:
        name: "{{ auth_user }}"
        uid: "{{ auth_uid }}"
        group: "{{ auth_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Add authelia user to docker group
      ansible.builtin.user:
        name: "{{ auth_user }}"
        groups: docker
        append: true

    # --- Directory Structure ---
    - name: Create authelia base directory
      ansible.builtin.file:
        path: "{{ auth_base_dir }}"
        state: directory
        owner: "{{ auth_user }}"
        group: "{{ auth_user }}"
        mode: "0755"

    - name: Create service directories
      ansible.builtin.file:
        path: "{{ auth_base_dir }}/{{ item }}"
        state: directory
        owner: "{{ auth_user }}"
        group: "{{ auth_user }}"
        mode: "0755"
      loop:
        - config
        - secrets

    - name: Set secrets directory permissions
      ansible.builtin.file:
        path: "{{ auth_base_dir }}/secrets"
        mode: "0700"

    # --- Generate Secrets ---
    # Three random 64-char hex strings for JWT, session, and storage encryption.
    # Only generated once -- idempotent via creates parameter.
    - name: Generate JWT secret
      ansible.builtin.shell:
        cmd: openssl rand -hex 32 > {{ auth_base_dir }}/secrets/jwt
        creates: "{{ auth_base_dir }}/secrets/jwt"

    - name: Generate session secret
      ansible.builtin.shell:
        cmd: openssl rand -hex 32 > {{ auth_base_dir }}/secrets/session
        creates: "{{ auth_base_dir }}/secrets/session"

    - name: Generate storage encryption key
      ansible.builtin.shell:
        cmd: openssl rand -hex 32 > {{ auth_base_dir }}/secrets/storage_encryption
        creates: "{{ auth_base_dir }}/secrets/storage_encryption"

    - name: Set secret file permissions
      ansible.builtin.file:
        path: "{{ auth_base_dir }}/secrets/{{ item }}"
        owner: "{{ auth_user }}"
        group: "{{ auth_user }}"
        mode: "0600"
      loop:
        - jwt
        - session
        - storage_encryption

    # --- Hash Admin Password ---
    # Pull image first so we can use authelia's built-in crypto hash tool.
    - name: Pull Authelia Docker image
      ansible.builtin.command:
        cmd: docker pull authelia/authelia:latest
      changed_when: true

    - name: Generate argon2id password hash
      ansible.builtin.command:
        cmd: >
          docker run --rm --entrypoint authelia authelia/authelia:latest
          crypto hash generate argon2
          --password '{{ authelia_admin_password }}'
      register: password_hash_result
      changed_when: false
      no_log: true

    - name: Extract password hash
      ansible.builtin.set_fact:
        # Output format: "Digest: $argon2id$..." -- strip the "Digest: " prefix
        authelia_password_hash: "{{ password_hash_result.stdout | regex_replace('^Digest: ', '') | trim }}"

    # --- Deploy Config Files ---
    - name: Copy Docker Compose file
      ansible.builtin.copy:
        src: "{{ compose_src }}"
        dest: "{{ auth_base_dir }}/docker-compose.yml"
        owner: "{{ auth_user }}"
        group: "{{ auth_user }}"
        mode: "0644"
      notify: Restart authelia

    - name: Copy Authelia configuration
      ansible.builtin.copy:
        src: "{{ config_src }}"
        dest: "{{ auth_base_dir }}/config/configuration.yml"
        owner: "{{ auth_user }}"
        group: "{{ auth_user }}"
        mode: "0644"
      notify: Restart authelia

    - name: Deploy users database with hashed password
      ansible.builtin.copy:
        content: |
          # users_database.yml - Authelia file-based user database
          # Generated by setup-authelia.yml -- do not edit manually.
          # To regenerate: make authelia AUTHELIA_ADMIN_PASSWORD="..."
          users:
            brandon:
              displayname: "Brandon Woodward"
              password: "{{ authelia_password_hash }}"
              email: brandon@woodhead.tech
              groups:
                - admins
                - users
        dest: "{{ auth_base_dir }}/config/users_database.yml"
        owner: "{{ auth_user }}"
        group: "{{ auth_user }}"
        mode: "0600"
      no_log: true
      notify: Restart authelia

    # --- Start Stack ---
    - name: Start Authelia stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ auth_base_dir }}"
      changed_when: true

    # --- Verify ---
    - name: Wait for Authelia to start
      ansible.builtin.pause:
        seconds: 15

    - name: Check Authelia health
      ansible.builtin.uri:
        url: "http://localhost:9091/api/health"
        return_content: true
      register: authelia_health
      failed_when: authelia_health.status != 200

    - name: Check running containers
      ansible.builtin.command:
        cmd: docker compose ps --format json
        chdir: "{{ auth_base_dir }}"
      register: compose_status
      changed_when: false

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Authelia SSO gateway deployed to {{ auth_base_dir }}"
          - ""
          - "Internal URL: http://{{ ansible_host }}:9091"
          - "External URL: https://auth.woodhead.tech (after Traefik route enabled)"
          - ""
          - "Login: brandon / <password you provided>"
          - ""
          - "NEXT STEPS:"
          - "  1. Redeploy Traefik to pick up the authelia middleware: make traefik"
          - "  2. Browse https://auth.woodhead.tech to verify the login portal"
          - "  3. Log in and check /opt/authelia/config/notification.txt for the TOTP registration link"
          - "  4. Scan the QR code with Google Authenticator or Authy"
          - "  5. Two-factor services now require password + TOTP code"

  handlers:
    - name: Restart authelia
      ansible.builtin.command:
        cmd: docker compose up -d --force-recreate
        chdir: "{{ auth_base_dir }}"
