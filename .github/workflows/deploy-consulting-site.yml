name: Deploy consulting site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'consulting-site/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: consulting-site/package-lock.json

      - name: Install dependencies
        working-directory: consulting-site
        run: npm ci

      - name: Build
        working-directory: consulting-site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=consulting-site --commit-dirty=true
          workingDirectory: consulting-site
